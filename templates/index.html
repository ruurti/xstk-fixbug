<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sân Chơi Cá Cược Bóng Đá</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-gray-900 text-gray-100 font-sans antialiased pb-12">

    <header class="bg-gray-800 border-b border-gray-700 sticky top-0 z-50 px-4 py-3 flex justify-between items-center shadow-md">
        <h1 class="text-xl font-black tracking-wider text-emerald-400">🔥 BETCORE</h1>
        <div id="user-info" class="text-xs bg-gray-700 px-3 py-1.5 rounded-full border border-gray-600 text-gray-300">
            Đang tải dữ liệu...
        </div>
    </header>

    <main class="max-w-xl mx-auto px-4 mt-6">
        <div class="flex items-center justify-between mb-4">
            <h2 class="text-base font-bold uppercase tracking-wide text-gray-400">⚽ Trận Đấu Sắp Diễn Ra</h2>
            <span class="text-xs text-emerald-400 bg-emerald-950/50 px-2 py-0.5 rounded border border-emerald-800/50">Live Mode</span>
        </div>

        <div id="match-list" class="space-y-4">
            <div class="animate-pulse bg-gray-800 h-28 rounded-xl border border-gray-700"></div>
            <div class="animate-pulse bg-gray-800 h-28 rounded-xl border border-gray-700"></div>
        </div>
    </main>

    <script src="/static/js/app.js"></script>
</body>
</html>
