<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cộng đồng tự học</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css?v={{ asset_version }}">
</head>
<body class="bg-slate-50 text-slate-900 font-sans antialiased pb-20">

    <header class="bg-white/95 backdrop-blur border-b border-slate-200 sticky top-0 z-50 shadow-sm">
        <div class="px-4 py-3 flex justify-between items-center">
            <a href="/"><h1 class="text-xl font-black tracking-wider text-sky-600">Khóa Tu Mùa Hè</h1></a>
            <div class="flex items-center gap-2">
                <a href="/admin" id="admin-header-link" class="hidden text-xs bg-sky-100 px-3 py-1.5 rounded-full border border-sky-200 text-sky-700 hover:bg-sky-200 transition-colors">
                    Admin
                </a>
                <a href="/profile" id="user-info" class="text-xs bg-white px-3 py-1.5 rounded-full border border-slate-200 text-slate-700 hover:border-sky-300 hover:text-sky-700 transition-colors shadow-sm">
                    Đang tải dữ liệu...
                </a>
            </div>
        </div>
        <!-- Live Ticker -->
        <div class="ticker-wrap">
            <div class="ticker-content" id="ticker-content">
                <span class="text-gray-600 text-xs px-4">⚡ Đang tải hoạt động mới nhất...</span>
            </div>
        </div>
    </header>

    <main class="max-w-xl mx-auto px-4 mt-6">
        <div class="flex items-center justify-between mb-4">
            <h2 class="text-base font-bold uppercase tracking-wide text-slate-500">⚽ Trận Đấu Sắp Diễn Ra</h2>
            <span class="text-xs text-sky-700 bg-sky-50 px-2 py-0.5 rounded border border-sky-200">Live Mode</span>
        </div>

        <div id="match-list" class="space-y-4">
            <div class="animate-pulse bg-white h-28 rounded-xl border border-slate-200 shadow-sm"></div>
            <div class="animate-pulse bg-white h-28 rounded-xl border border-slate-200 shadow-sm"></div>
        </div>

        <section class="mt-6 mb-6">
            <div class="flex items-center justify-between mb-3">
                <h2 class="text-base font-bold uppercase tracking-wide text-slate-500">Trận đã hoàn tất gần nhất</h2>
                <span class="text-xs text-slate-400">Thắng thua đã rõ</span>
            </div>
            <div id="latest-finished-body" class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
                <div class="animate-pulse py-8 text-center text-slate-400 text-sm">Đang tải trận gần nhất...</div>
            </div>
        </section>

        <!-- Bảng Phong Thần -->
        <div class="leaderboard-section">
            <div class="leaderboard-title">
                <h2 class="text-base font-bold uppercase tracking-wide text-slate-500">🏆 Bảng Phong Thần</h2>
                <button onclick="toggleLeaderboard()" id="lb-toggle-btn"
                    class="text-xs text-sky-700 bg-sky-50 px-2 py-0.5 rounded border border-sky-200 hover:bg-sky-100 transition-colors">
                    Thu gọn
                </button>
            </div>
            <div id="leaderboard-container">
                <div class="leaderboard-card">
                    <div id="leaderboard-body">
                        <div class="animate-pulse px-3 py-10 text-center text-gray-600 text-xs">Đang tải bảng xếp hạng...</div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Bottom Nav -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur border-t border-slate-200 flex justify-around py-2 z-50 shadow-[0_-8px_24px_rgba(15,23,42,0.05)]">
        <a href="/" class="flex flex-col items-center gap-0.5 text-sky-600 px-4 py-1">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
            <span class="text-xs font-semibold">Trang chủ</span>
        </a>
        <a href="/profile" class="flex flex-col items-center gap-0.5 text-slate-500 hover:text-sky-600 transition-colors px-4 py-1">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            <span class="text-xs">Cá nhân</span>
        </a>
        <a href="/admin" id="admin-nav-link" class="hidden flex flex-col items-center gap-0.5 text-slate-500 hover:text-indigo-500 transition-colors px-4 py-1">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            <span class="text-xs">Admin</span>
        </a>
    </nav>

    <div id="match-detail-modal" class="hidden fixed inset-0 z-[60] bg-slate-950/50 backdrop-blur-sm overflow-y-auto">
        <div class="min-h-full px-4 py-4 flex items-start justify-center">
            <div class="w-full max-w-5xl rounded-2xl border border-slate-200 bg-white shadow-2xl overflow-hidden">
                <div class="flex items-start justify-between gap-3 px-4 py-4 border-b border-slate-200">
                    <div class="min-w-0">
                        <div class="text-[11px] uppercase tracking-[0.18em] text-slate-500">Chi tiết trận đấu</div>
                        <div id="match-detail-title" class="mt-1 text-lg md:text-xl font-black text-slate-900 truncate"></div>
                        <div id="match-detail-subtitle" class="mt-1 text-xs md:text-sm text-slate-500"></div>
                    </div>
                    <button type="button" onclick="closeMatchDetail()" class="text-slate-400 hover:text-slate-900 p-2 rounded-full hover:bg-slate-100 transition-colors" title="Đóng">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
                <div class="px-4 py-4 space-y-4">
                    <div id="match-detail-quote" class="rounded-xl border border-amber-200 bg-amber-50 px-4 py-3 text-amber-900 italic"></div>
                    <div id="match-detail-body" class="space-y-4"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleLeaderboard() {
            const container = document.getElementById("leaderboard-container");
            const btn = document.getElementById("lb-toggle-btn");
            const isHidden = container.classList.toggle("hidden");
            btn.textContent = isHidden ? "Mở rộng" : "Thu gọn";
        }
    </script>

    <script src="/static/js/app.js?v={{ asset_version }}"></script>
</body>
</html>
