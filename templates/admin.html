<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin - Quản Lý Trận Đấu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css?v={{ asset_version }}">
</head>
<body class="bg-slate-50 text-slate-900 font-sans antialiased pb-12">

    <header class="bg-white/95 backdrop-blur border-b border-slate-200 sticky top-0 z-50 px-4 py-3 flex justify-between items-center shadow-sm">
        <h1 class="text-xl font-black tracking-wider text-sky-600">Admin Panel</h1>
        <div class="flex items-center gap-2">
            <a href="/" class="text-xs bg-sky-50 px-3 py-1.5 rounded-full border border-sky-200 text-sky-700 hover:bg-sky-100 transition-colors">
                Trang chủ
            </a>
            <div id="user-info" class="text-xs bg-white px-3 py-1.5 rounded-full border border-slate-200 text-slate-700 shadow-sm">
                Đang tải...
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 mt-6">
        <section class="bg-white border border-slate-200 rounded-xl p-4 mb-6 shadow-sm">
            <div class="flex items-center justify-between mb-4">
                <h2 id="match-form-title" class="text-base font-bold uppercase tracking-wide text-slate-500">Thêm trận đấu</h2>
                <button id="cancel-edit-btn" type="button" onclick="resetMatchForm()" class="hidden text-slate-600 border border-slate-200 hover:bg-slate-50 px-3 py-1.5 rounded-lg text-sm font-semibold transition-colors">
                    Hủy sửa
                </button>
            </div>
            <form id="match-form" class="grid grid-cols-1 md:grid-cols-2 gap-3">
                <input type="hidden" id="match-id">
                <input id="home-team" class="bg-white border border-slate-200 text-slate-900 px-3 py-2 rounded-lg" placeholder="Đội nhà" required maxlength="80">
                <input id="away-team" class="bg-white border border-slate-200 text-slate-900 px-3 py-2 rounded-lg" placeholder="Đội khách" required maxlength="80">
                <input id="home-icon" class="bg-white border border-slate-200 text-slate-900 px-3 py-2 rounded-lg" placeholder="Icon/URL đội nhà">
                <input id="away-icon" class="bg-white border border-slate-200 text-slate-900 px-3 py-2 rounded-lg" placeholder="Icon/URL đội khách">
                <input id="handicap" type="number" step="0.25" value="0" class="bg-white border border-slate-200 text-slate-900 px-3 py-2 rounded-lg" placeholder="Kèo chấp">
                <input id="start-time" type="datetime-local" class="bg-white border border-slate-200 text-slate-900 px-3 py-2 rounded-lg" required>
                <select id="status" class="bg-white border border-slate-200 text-slate-900 px-3 py-2 rounded-lg">
                    <option value="upcoming">upcoming</option>
                    <option value="live">live</option>
                </select>
                <button id="save-match-btn" type="submit" class="bg-sky-600 hover:bg-sky-500 text-white px-4 py-2 rounded-lg font-semibold transition-colors">
                    Lưu trận
                </button>
            </form>
        </section>

        <section class="bg-white border border-slate-200 rounded-xl p-4 mb-6 shadow-sm">
            <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3 mb-4">
                <h2 class="text-base font-bold uppercase tracking-wide text-slate-500">Import CSV trận đấu</h2>
            </div>
            <form id="csv-import-form" class="flex flex-col md:flex-row gap-3">
                <input id="csv-file" type="file" accept=".csv,text/csv" class="flex-1 bg-white border border-slate-200 text-slate-900 px-3 py-2 rounded-lg file:mr-3 file:border-0 file:bg-sky-100 file:text-sky-700 file:px-3 file:py-1.5 file:rounded file:font-semibold">
                <button id="csv-import-btn" type="submit" class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-lg font-semibold transition-colors">
                    Import CSV
                </button>
            </form>
            <div id="csv-import-result" class="hidden mt-3 text-sm rounded-lg border px-3 py-2"></div>
        </section>

        <section class="bg-white border border-slate-200 rounded-xl p-4 mb-6 shadow-sm">
            <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3 mb-4">
                <h2 class="text-base font-bold uppercase tracking-wide text-slate-500">Yêu cầu nạp điểm</h2>
                <button type="button" onclick="fetchRechargeRequests()" class="text-slate-600 border border-slate-200 hover:bg-slate-50 px-3 py-1.5 rounded-lg text-sm font-semibold transition-colors">
                    Làm mới
                </button>
            </div>
            <div id="admin-recharge-list" class="space-y-3">
                <div class="animate-pulse bg-white h-20 rounded-xl border border-slate-200 shadow-sm"></div>
            </div>
        </section>

        <div class="flex items-center justify-between mb-4">
            <h2 class="text-base font-bold uppercase tracking-wide text-slate-500">Danh sách trận đấu</h2>
        </div>

        <div id="admin-match-list" class="space-y-4">
            <div class="animate-pulse bg-white h-28 rounded-xl border border-slate-200 shadow-sm"></div>
        </div>
    </main>

    <script src="/static/js/admin.js?v={{ asset_version }}"></script>
</body>
</html>
