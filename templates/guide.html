<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hướng dẫn nhập học</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css?v={{ asset_version }}">
</head>
<body class="bg-slate-50 text-slate-900 font-sans antialiased pb-20">
    <header class="bg-white/95 backdrop-blur border-b border-slate-200 sticky top-0 z-50 shadow-sm">
        <div class="px-4 py-3 flex justify-between items-center gap-3">
            <a href="/" class="min-w-0">
                <h1 class="text-xl font-black tracking-wider text-sky-600 truncate">Hướng dẫn nhập học</h1>
            </a>
            <a href="/" class="text-xs bg-sky-50 text-sky-700 border border-sky-200 px-3 py-1.5 rounded-full font-semibold hover:bg-sky-100 transition-colors">
                Về trang chủ
            </a>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-6">
        <section class="rounded-3xl border border-slate-200 bg-white shadow-sm overflow-hidden">
            <div class="border-b border-slate-200 px-5 py-4">
                <div class="text-[11px] uppercase tracking-[0.3em] text-sky-600">Guide</div>
                <h2 class="mt-2 text-2xl md:text-3xl font-black text-slate-900">Hướng dẫn nhập học</h2>
            </div>
            <article class="guide-content px-5 py-6 text-sm leading-7 text-slate-700">
                {{ guide_html | safe }}
            </article>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur border-t border-slate-200 flex justify-around py-2 z-50 shadow-[0_-8px_24px_rgba(15,23,42,0.05)]">
        <a href="/" class="flex flex-col items-center gap-0.5 text-slate-500 hover:text-sky-600 transition-colors px-4 py-1">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
            </svg>
            <span class="text-xs">Trang chủ</span>
        </a>
        <a href="/guide" class="flex flex-col items-center gap-0.5 text-sky-600 px-4 py-1">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v12m-6-6h12"/>
            </svg>
            <span class="text-xs font-semibold">Hướng dẫn</span>
        </a>
        <a href="/profile" class="flex flex-col items-center gap-0.5 text-slate-500 hover:text-sky-600 transition-colors px-4 py-1">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
            <span class="text-xs">Cá nhân</span>
        </a>
    </nav>
</body>
</html>
